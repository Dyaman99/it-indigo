<html lang="en" xml:lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <meta name="description" content="currency value history chart">
    <meta name="keywords" content="currency, chart, ajax, javascript">
    <meta name="author" content="Dilasa Yaman">
    <title>Currency Value Chart</title>
    <link href="style/style.css" rel="stylesheet" type="text/css">
</head>
<body>
    <form id="myform" onsubmit="return false" novalidate="novalidate">
        <label for="fromCurrency">From Currency:</label>
        <select id="fromCurrency" name="fromCurrency" required>
            <option value="">Select a currency</option>
            <option value="USD">US Dollar</option>
            <option value="EUR">Euro</option>
            <option value="TRY">Turkish Lira</option>
            <option value="TJS">Tajikistani Somoni</option>
            <option value="KGS">Kyrgyz Som</option>
        </select>
        <br><br>

        <label for="toCurrency">To Currency:</label>
        <select id="toCurrency" name="toCurrency" required>
            <option value="">Select a currency</option>
            <option value="USD">US Dollar</option>
            <option value="EUR">Euro</option>
            <option value="TRY">Turkish Lira</option>
            <option value="TJS">Tajikistani Somoni</option>
            <option value="KGS">Kyrgyz Som</option>
        </select>

        <br><br>

         <label for="FromDate" class="formlabel">From Date:</label>
            <input type="date" name="FromDate" id="FromDate" data-rule-required="true" data-msg-required="From Date is Required">
            <label id="FromDateError" for="FromDate" class="error"></label>

        <br><br>

            <label for="ToDate" class="formlabel">To Date:</label>
            <input type="date" name="ToDate" id="ToDate" 
			     data-rule-required="true" data-msg-required="To Date is Required">

	        <label id="ToDateError" for="ToDate" class="error"></label>
            <br><br>


            <input type="submit" value="showResults" id="showResults" name="showResults" onclick="showCurrencyChart();">
            <input type="submit" formnovalidate value="Clear" id="Clear" name="Clear" onclick="ClearForm();">
            <hr>
            <br>

            <div class="container">
                <canvas id="chart-currency" width="400" height="400"></canvas>
            </div>

    </form>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/jquery.validation/1.16.0/jquery.validate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/jquery.validation/1.16.0/additional-methods.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.3/Chart.min.js"></script>
    <script src="assets/js/script.js"></script>

<span id="PING_IFRAME_FORM_DETECTION" style="display: none;"></span>

</body>

</html>
